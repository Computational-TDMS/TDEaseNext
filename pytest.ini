[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --asyncio-mode=auto
    --ignore=tests/fixtures/tmp_pytest
    --ignore-glob=pytest-cache-files-*
    --ignore-glob=prsm-bundle-test-*
norecursedirs =
    .git
    .venv
    .uv-cache
    .pytest_cache
    .pytest_temp
    .pytest-work
    .pytest-run
    data
    logs
    tmp_pytest
    pytest-cache-files-*
    prsm-bundle-test-*
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    requires_docker: Tests that require Docker
    requires_network: Tests that require network access
    prod_smoke: Production smoke tests that require real tools and fixtures
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
